services:
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.14
    command: >
      etcd -advertise-client-urls=http://etcd:2379
           -listen-client-urls http://0.0.0.0:2379
           --data-dir /etcd
    volumes:
      - etcd_data:/etcd

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    command: minio server /minio_data --console-address ":9001"
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"
    volumes:
      - minio_data:/minio_data

  milvus:
    container_name: milvus
    image: milvusdb/milvus:v2.4.9
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    depends_on:
      - etcd
      - minio
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 10s
      timeout: 5s
      retries: 20

  neo4j:
    container_name: neo4j
    image: neo4j:5.26
    environment:
      NEO4J_AUTH: neo4j/neo4jpassword
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p neo4jpassword 'RETURN 1;' >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  rag-api:
    container_name: rag-api
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      MILVUS_URI: http://milvus:19530
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: neo4jpassword
      NEO4J_DATABASE: neo4j
      RAG_NORMATIVA_SOURCE_DIR: /app/normativa
    depends_on:
      milvus:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    ports:
      - "8001:8001"
    volumes:
      - ./docs:/app/docs
      - ./data:/app/data
      - "C:/Users/ST09/Desktop/NORMATIVA A TRABAJAR:/app/normativa:ro"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  etcd_data:
  minio_data:
  milvus_data:
  neo4j_data:
  neo4j_logs:
